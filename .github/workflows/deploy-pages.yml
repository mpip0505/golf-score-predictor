# Publishes the static web app in web/ to GitHub Pages on every push to main.
#
# One-time setup on GitHub: Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, each push deploys automatically to
# https://mpip0505.github.io/golf-score-predictor/
name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Let one deployment finish before the next starts.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web          # only the static site is published
      - id: deployment
        uses: actions/deploy-pages@v4
